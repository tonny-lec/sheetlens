name: Windows XLSM E2E

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/windows-xlsm.yml"
      - "pyproject.toml"
      - "uv.lock"
      - "src/**"
      - "tests/fixtures/xlsm/**"
      - "tests/test_xlsm_e2e.py"
  pull_request:
    paths:
      - ".github/workflows/windows-xlsm.yml"
      - "pyproject.toml"
      - "uv.lock"
      - "src/**"
      - "tests/fixtures/xlsm/**"
      - "tests/test_xlsm_e2e.py"

permissions:
  contents: read

jobs:
  xlsm-e2e:
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install uv and Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Sync locked environment
        run: uv sync --locked
      - name: Run real XLSM E2E tests
        run: uv run --frozen pytest tests/test_xlsm_e2e.py -q
